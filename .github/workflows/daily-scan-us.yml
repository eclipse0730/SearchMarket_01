name: Daily Scan US Markets (After Close)

on:
  schedule:
    # 21:05 UTC = 5:05 PM EDT (summer) / 4:05 PM EST (winter) — runs after NYSE/NASDAQ close
    - cron: "5 21 * * 1-5"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch prices
        run: python Search.py price us --workers 1

      - name: Compute indicators
        run: python Search.py indicators us

      - name: Run screener
        run: python Search.py screen us
