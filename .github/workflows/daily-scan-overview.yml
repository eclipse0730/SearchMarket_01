name: Daily Scan Overview Markets (KST 08:20)

on:
  schedule:
    - cron: "20 23 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare database
        run: |
          python -m market_scanner.storage.db init
          python -m market_scanner.storage.db refresh-master --market global-indices
          python -m market_scanner.storage.db refresh-master --market commodities

      - name: Run overview scanners
        run: |
          python Search.py --market global-indices
          python Search.py --market commodities

