name: Daily Scan Overview Markets (KST 08:20)

on:
  schedule:
    - cron: "20 23 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch prices
        run: |
          python Search.py price global-indices --workers 1
          python Search.py price sector-etfs --workers 1
          python Search.py price commodities --workers 1

      - name: Compute indicators
        run: |
          python Search.py indicators global-indices
          python Search.py indicators sector-etfs
          python Search.py indicators commodities

      - name: Run screener
        run: |
          python Search.py screen global-indices
          python Search.py screen sector-etfs
          python Search.py screen commodities
