name: Daily Scan Overview Markets (KST 08:20)

on:
  schedule:
    - cron: "20 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run overview scanners
        run: |
          python Search.py --market global-indices
          python Search.py --market theme-proxies
          python Search.py --market commodities

      - name: Commit results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/Data_GlobalIndices_*.csv analysis/Analysis_GlobalIndices_*.md reports/Report_GlobalIndices_*.html
          git add data/Data_ThemeProxies_*.csv analysis/Analysis_ThemeProxies_*.md reports/Report_ThemeProxies_*.html
          git add data/Data_Commodities_*.csv analysis/Analysis_Commodities_*.md reports/Report_Commodities_*.html
          git add market_scanner/assets/instruments.json market_scanner/assets/investing_url_cache.json market_scanner/assets/sp500_members_cache.json
          git diff --staged --quiet || git commit -m "scan(overview): $(date +'%Y-%m-%d')"

      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
