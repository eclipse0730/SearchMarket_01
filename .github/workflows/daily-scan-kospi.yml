name: Daily Scan KOSPI (KST 16:05)

on:
  schedule:
    - cron: "5 7 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      DATABASE_URL: postgresql://searchmarket:searchmarket@localhost:5432/searchmarket
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: searchmarket
          POSTGRES_USER: searchmarket
          POSTGRES_PASSWORD: searchmarket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U searchmarket -d searchmarket"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare database
        run: |
          python -m market_scanner.storage.db init
          python -m market_scanner.storage.db refresh-master --market kospi

      - name: Run scanner
        run: python Search.py --market kospi

