name: Daily Scan KOSPI (KST 16:05)

on:
  schedule:
    - cron: "5 7 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare database
        run: |
          python -m market_scanner.storage.db init
          python -m market_scanner.storage.db refresh-master --market kospi

      - name: Run scanner
        run: python Search.py --market kospi

