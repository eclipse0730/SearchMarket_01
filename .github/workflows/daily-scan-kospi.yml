name: Daily Scan — KOSPI (KST 16:05)

on:
  schedule:
    - cron: '5 7 * * *'    # UTC 07:05 = KST 16:05
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas lxml requests

      - name: Run scanner
        run: python Search_Kospi.py

      - name: Commit results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add Data_Kospi_*.csv Analysis_Kospi_*.md Report_Kospi_*.html
          git diff --staged --quiet || git commit -m "scan(Kospi): $(date +'%Y-%m-%d')"

      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
