name: Daily Scan KOSDAQ (KST 16:35)

on:
  schedule:
    - cron: "35 7 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare database
        run: |
          python -m market_scanner.storage.db init
          python -m market_scanner.storage.db refresh-master --market kosdaq

      - name: Run scanner
        run: python Search.py --market kosdaq

