name: Daily Scan KOSDAQ (KST 16:35)

on:
  schedule:
    - cron: "35 7 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch prices
        run: python -m market_scanner.collectors.prices fetch --market kosdaq --worker 4

      - name: Compute indicators
        run: python -m market_scanner.analysis.indicators compute --market kosdaq

      - name: Run screener
        run: python -m market_scanner.analysis.screener run --market kosdaq
