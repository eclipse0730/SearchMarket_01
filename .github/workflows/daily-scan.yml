name: Daily Scan US Markets (KST 08:05)

on:
  schedule:
    - cron: "5 23 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare database
        run: |
          python -m market_scanner.storage.db init
          python -m market_scanner.storage.db refresh-master --market us

      - name: Run NASDAQ 100 scanner
        run: python Search.py --market us --universe nasdaq100

      - name: Run S&P 500 scanner
        run: python Search.py --market us --universe sp500

