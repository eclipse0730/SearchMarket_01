name: Daily Scan — US Market (KST 08:05)

on:
  schedule:
    - cron: '5 23 * * *'   # UTC 23:05 = KST 08:05
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas lxml deep-translator requests

      - name: Run scanner
        run: python Search60.py

      - name: Generate index.html
        run: |
          TODAY=$(date +'%Y%m%d')
          cat > index.html << EOF
          <!DOCTYPE html>
          <html lang="ko">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=Report_${TODAY}.html">
            <title>US Market Report</title>
          </head>
          <body style="background:#0d1117;color:#c9d1d9;font-family:sans-serif;text-align:center;padding:60px">
            <h2>US Market Report (${TODAY})</h2>
            <p>리다이렉트 중... <a href="Report_${TODAY}.html" style="color:#58a6ff">클릭하여 이동</a></p>
          </body>
          </html>
          EOF

      - name: Commit results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add Data_*.csv Analysis_*.md Report_*.html index.html
          git diff --staged --quiet || git commit -m "scan(US): $(date +'%Y-%m-%d')"

      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
