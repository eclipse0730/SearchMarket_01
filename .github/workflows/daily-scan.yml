name: Daily Scan US Markets (KST 08:05)

on:
  schedule:
    - cron: "5 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NASDAQ 100 scanner
        run: python Search.py --market us --universe nasdaq100

      - name: Run S&P 500 scanner
        run: python Search.py --market us --universe sp500

      - name: Commit results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/Data_*.csv analysis/Analysis_*.md reports/Report_*.html market_scanner/assets/instruments.json market_scanner/assets/investing_url_cache.json market_scanner/assets/sp500_members_cache.json
          git diff --staged --quiet || git commit -m "scan(US markets): $(date +'%Y-%m-%d')"

      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
