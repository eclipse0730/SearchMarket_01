name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Search.py"
      - "requirements.txt"
      - "market_scanner/**"
      - ".github/workflows/**"
  workflow_run:
    workflows:
      - Daily Scan US Markets (KST 08:05)
      - Daily Scan Overview Markets (KST 08:20)
      - Daily Scan KOSPI (KST 16:05)
      - Daily Scan KOSDAQ (KST 16:35)
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      DATABASE_URL: postgresql://searchmarket:searchmarket@localhost:5432/searchmarket
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: searchmarket
          POSTGRES_USER: searchmarket
          POSTGRES_PASSWORD: searchmarket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U searchmarket -d searchmarket"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare database
        run: |
          python -m market_scanner.storage.db init
          python -m market_scanner.storage.db refresh-master --market us
          python -m market_scanner.storage.db refresh-master --market kospi
          python -m market_scanner.storage.db refresh-master --market kosdaq
          python -m market_scanner.storage.db refresh-master --market global-indices
          python -m market_scanner.storage.db refresh-master --market commodities

      - name: Populate site database
        run: |
          python Search.py --market us --universe nasdaq100
          python Search.py --market us --universe sp500
          python Search.py --market kospi
          python Search.py --market kosdaq
          python Search.py --market global-indices
          python Search.py --market commodities

      - name: Build static site
        run: python -m market_scanner.reports.site_builder

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
