name: Deploy GitHub Pages

on:
  workflow_run:
    workflows:
      - Daily Scan US Markets (KST 08:05)
      - Daily Scan US Markets (After Close)
      - Daily Scan Overview Markets (KST 08:20)
      - Daily Scan KOSPI (KST 16:05)
      - Daily Scan KOSDAQ (KST 16:35)
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build static site
        run: python -m market_scanner.reports.site_builder

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
